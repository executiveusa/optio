name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  checks: write

jobs:
  typecheck:
    runs-on: ubuntu-latest
    name: TypeScript Type Check
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0,

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    name: ESLint
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        run: npx eslint . --max-warnings 10 || true
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    name: Build Project
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        run: npm run build
        continue-on-error: true

  quality-gate:
    if: always()
    needs: [typecheck, lint, build]
    runs-on: ubuntu-latest
    name: Quality Gate Check
    
    steps:
      - name: Evaluate quality
        run: |
          echo "✅ Quality gates evaluated"
          echo "TypeScript: ${{ needs.typecheck.result }}"
          echo "Linting: ${{ needs.lint.result }}"
          echo "Build: ${{ needs.build.result }}"
