name: Auto-Merge on Green

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_run'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR status and auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -e
          
          # Get the PR number
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number found, exiting"
            exit 0
          fi
          
          echo "Checking PR #$PR_NUMBER"
          
          # Get PR details
          PR_DATA=$(gh pr view $PR_NUMBER --json mergeable,mergeable_state,statusCheckRollup,author,headRefName,baseRefName)
          
          # Extract values
          MERGEABLE=$(echo "$PR_DATA" | jq -r '.mergeable')
          STATE=$(echo "$PR_DATA" | jq -r '.mergeable_state')
          
          echo "Mergeable: $MERGEABLE"
          echo "State: $STATE"
          
          # Get all checks
          CHECKS=$(gh pr view $PR_NUMBER --json statusCheckRollup)
          CONCLUSION=$(echo "$CHECKS" | jq -r '.statusCheckRollup[].conclusion' | sort -u)
          
          echo "Check conclusions: $CONCLUSION"
          
          # Check if mergeable and no conflicts
          if [ "$MERGEABLE" != "true" ]; then
            echo "PR is not mergeable (likely has conflicts)"
            exit 0
          fi
          
          # Check if all checks passed
          if echo "$CHECKS" | jq -e '.statusCheckRollup[] | select(.conclusion == "FAILURE" or .conclusion == "NEUTRAL")' > /dev/null; then
            echo "Some checks have not passed yet or failed"
            exit 0
          fi
          
          # Check if all required checks are complete
          PENDING=$(echo "$CHECKS" | jq -r '.statusCheckRollup[] | select(.conclusion == null) | .name' | head -1)
          
          if [ ! -z "$PENDING" ]; then
            echo "Pending checks: $PENDING"
            exit 0
          fi
          
          # If we get here, all checks passed and no conflicts
          echo "✅ All checks passed and no conflicts detected - Merging PR"
          
          gh pr merge $PR_NUMBER \
            --squash \
            --delete-branch \
            --admin \
            --auto || true

      - name: Wait and verify merge
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
        run: |
          sleep 5
          if gh pr view $PR_NUMBER --json state 2>/dev/null | jq -e '.state == "MERGED"' >/dev/null 2>&1; then
            echo "✅ PR successfully merged to main"
          else
            echo "⏳ PR merge in progress or workflow not yet triggered"
          fi
